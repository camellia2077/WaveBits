name: ci-host-verify

on:
  pull_request:
    paths:
      - ".github/workflows/ci-host-verify.yml"
      - "CMakeLists.txt"
      - "Test/**"
      - "apps/audio_cli/**"
      - "cmake/**"
      - "libs/**"
      - "tools/**"
  push:
    paths:
      - ".github/workflows/ci-host-verify.yml"
      - "CMakeLists.txt"
      - "Test/**"
      - "apps/audio_cli/**"
      - "cmake/**"
      - "libs/**"
      - "tools/**"

jobs:
  host-verify:
    name: Host Verify
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      PKG_CONFIG: pkgconf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling dependencies
        shell: pwsh
        run: python -m pip install -r tools/requirements.txt

      - name: Setup MSYS2 UCRT64 toolchain
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libsndfile

      - name: Add MSYS2 tools to PATH
        shell: pwsh
        run: |
          "${{ steps.msys2.outputs.msys2-location }}\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "${{ steps.msys2.outputs.msys2-location }}\usr\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show toolchain versions
        shell: pwsh
        run: |
          python --version
          clang++ --version
          cmake --version
          ninja --version
          Write-Host "MSYS2 location: ${{ steps.msys2.outputs.msys2-location }}"
          Get-Command pkgconf
          & $env:PKG_CONFIG --modversion sndfile

      - name: List verify check groups
        shell: pwsh
        run: python tools/run.py verify --list-checks

      - name: Verify host default path
        shell: pwsh
        run: python tools/run.py verify --build-dir build/dev --skip-android

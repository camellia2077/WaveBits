name: ci-host-verify

on:
  pull_request:
    paths:
      - ".github/workflows/ci-host-verify.yml"
      - "CMakeLists.txt"
      - "Test/**"
      - "apps/audio_cli/**"
      - "cmake/**"
      - "libs/**"
      - "tools/**"
  push:
    paths:
      - ".github/workflows/ci-host-verify.yml"
      - "CMakeLists.txt"
      - "Test/**"
      - "apps/audio_cli/**"
      - "cmake/**"
      - "libs/**"
      - "tools/**"

jobs:
  host-verify:
    name: Host Verify
    runs-on: windows-latest
    timeout-minutes: 90
    env:
      WAVEBITS_MSYS2_UCRT64_BIN: C:\msys64\ucrt64\bin
      WAVEBITS_MSYS2_USR_BIN: C:\msys64\usr\bin
      PKG_CONFIG: C:\msys64\ucrt64\bin\pkgconf.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup MSYS2 UCRT64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-clang
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libsndfile

      - name: Add MSYS2 tools to PATH
        shell: pwsh
        run: |
          $env:WAVEBITS_MSYS2_UCRT64_BIN | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:WAVEBITS_MSYS2_USR_BIN | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show toolchain versions
        shell: pwsh
        run: |
          $env:PATH = "$env:WAVEBITS_MSYS2_UCRT64_BIN;$env:WAVEBITS_MSYS2_USR_BIN;$env:PATH"
          python --version
          clang++ --version
          cmake --version
          ninja --version
          & $env:PKG_CONFIG --modversion sndfile

      - name: List verify check groups
        shell: pwsh
        run: python tools/run.py verify --list-checks

      - name: Verify host default path
        shell: pwsh
        run: |
          $env:PATH = "$env:WAVEBITS_MSYS2_UCRT64_BIN;$env:WAVEBITS_MSYS2_USR_BIN;$env:PATH"
          python tools/run.py verify --build-dir build/dev --skip-android

name: ci-android-quality

on:
  pull_request:
    paths:
      - ".github/workflows/ci-android-assemble.yml"
      - ".github/workflows/ci-android-quality.yml"
      - "apps/audio_android/**"
      - "tooling/**"
      - "tools/**"
  push:
    paths:
      - ".github/workflows/ci-android-assemble.yml"
      - ".github/workflows/ci-android-quality.yml"
      - "apps/audio_android/**"
      - "tooling/**"
      - "tools/**"

jobs:
  android-quality:
    name: Android Quality
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read build config
        id: build-config
        shell: bash
        run: |
          python3 - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          config = tomllib.loads(Path("tooling/build.toml").read_text(encoding="utf-8"))
          github_output = Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"python-version={config['ci']['python']}\n")
              handle.write(f"java-version={config['ci']['java']}\n")
          PY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "${{ steps.build-config.outputs.python-version }}"

      - name: Install Python tooling dependencies
        shell: bash
        run: python -m pip install -r tools/requirements.txt

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "${{ steps.build-config.outputs.java-version }}"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Show Android quality toolchain versions
        shell: bash
        run: |
          python --version
          java -version
          command -v sdkmanager
          sdkmanager --version

      - name: Run Android quality gate
        shell: bash
        run: python tools/run.py android quality

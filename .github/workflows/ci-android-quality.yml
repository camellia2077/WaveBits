name: ci-android-quality

on:
  pull_request:
    paths:
      - ".github/workflows/ci-android-assemble.yml"
      - ".github/workflows/ci-android-quality.yml"
      - "apps/audio_android/**"
      - "tools/**"
  push:
    paths:
      - ".github/workflows/ci-android-assemble.yml"
      - ".github/workflows/ci-android-quality.yml"
      - "apps/audio_android/**"
      - "tools/**"

jobs:
  android-quality:
    name: Android Quality
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python tooling dependencies
        shell: bash
        run: python -m pip install -r tools/requirements.txt

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Show Android quality toolchain versions
        shell: bash
        run: |
          python --version
          java -version
          sdkmanager --version

      - name: Run Android quality gate
        shell: bash
        run: python tools/run.py android quality
